services:
  postgres:
    image: postgres:16
    container_name: ai_data_analyst_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-analyst_db}
      POSTGRES_USER: ${POSTGRES_USER:-analyst_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-analyst_admin} -d ${POSTGRES_DB:-analyst_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
